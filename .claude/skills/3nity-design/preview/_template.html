<!doctype html><html><head><meta charset="utf-8"/>
<title>3NITY · Card</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);overflow:hidden}
  .card{padding:20px 24px;box-sizing:border-box;width:700px;min-height:150px;}
  .card[data-surface="cream"]{background:var(--tn-cream)}
  .row{display:flex;align-items:stretch;gap:14px}
  .col{display:flex;flex-direction:column;gap:8px}
  .grow{flex:1}
  .meta-tag{font-family:var(--font-mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--fg-mute)}
</style>
</head><body><div class="card"></div></body></html>
