<!doctype html>
<!-- @dsCard group="Brand" name="Brand · Isotype" subtitle="7 versiones oficiales · lime, lime-pure, cobalt, magenta, cream, black, soft" viewport="700x440" --><html><head><meta charset="utf-8"/><title>Brand · Isotype</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:#1E1F1E;color:#FFF8F0;font-family:"JetBrains Mono",monospace}
  .card{width:700px;height:440px;padding:18px 20px;box-sizing:border-box;display:flex;flex-direction:column;gap:12px}
  .head{display:flex;justify-content:space-between;align-items:flex-end}
  .title{font-family:"Clesmont","Space Grotesk",sans-serif;font-weight:700;text-transform:uppercase;font-size:22px;letter-spacing:-.01em;line-height:1}
  .meta{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:#7E7C76}
  .acc{color:#44FF02}

  .grid{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:1fr;gap:8px;flex:1;min-height:0}
  .cell{position:relative;display:flex;align-items:center;justify-content:center;padding:10px;box-sizing:border-box;overflow:hidden}
  .cell img{max-width:74%;max-height:74%;width:auto;height:auto;display:block;image-rendering:pixelated;image-rendering:crisp-edges}
  .lbl{position:absolute;left:8px;bottom:6px;font-size:7.5px;letter-spacing:.18em;text-transform:uppercase;line-height:1.2}
  .hex{position:absolute;right:8px;bottom:6px;font-size:7.5px;letter-spacing:.14em;text-transform:uppercase;line-height:1.2;font-weight:500}

  /* swatches */
  .bg-black{background:#1E1F1E;color:#FFF8F0;outline:1px solid #2A2B2A;outline-offset:-1px}
  .bg-cream{background:#FFF8F0;color:#1E1F1E}
  .bg-lime{background:#A7EA21;color:#1E1F1E}
  .bg-lime-pure{background:#44FF02;color:#1E1F1E}
  .bg-cobalt{background:#1B2CC1;color:#FFF8F0}
  .bg-magenta{background:#DC0073;color:#FFF8F0}
  .bg-checker{background:repeating-conic-gradient(#FFF8F0 0% 25%,#E5DED2 0% 50%) 50% / 16px 16px;color:#1E1F1E}
</style></head><body>
<div class="card">
  <div class="head">
    <div>
      <div class="meta">BRAND · <span class="acc">ISOTYPE / 7 VERSIONES OFICIALES</span></div>
      <div class="title">3nity Mark · Pixel Glyph</div>
    </div>
    <div class="meta" style="text-align:right;line-height:1.6">
      8-BIT BITMAP<br/>
      ESCALA MÍNIMA · 32px<br/>
      ÁREA SEGURA · 1 MÓDULO
    </div>
  </div>

  <div class="grid">
    <!-- Row 1 — primary brand stack -->
    <div class="cell bg-black">
      <img src="../brand/isotype-lime.png" alt="lime on black"/>
      <div class="lbl">LIME / BLACK</div>
      <div class="hex">PRIMARIO</div>
    </div>
    <div class="cell bg-black">
      <img src="../brand/isotype-cobalt.png" alt="cobalt on black"/>
      <div class="lbl">COBALT</div>
      <div class="hex">N.°1B2CC1</div>
    </div>
    <div class="cell bg-black">
      <img src="../brand/isotype-magenta.png" alt="magenta on black"/>
      <div class="lbl">MAGENTA</div>
      <div class="hex">N.°DC0073</div>
    </div>
    <div class="cell bg-black">
      <img src="../brand/isotype-lime-pure.png" alt="lime pure on black"/>
      <div class="lbl">LIME PURE</div>
      <div class="hex">N.°44FF02</div>
    </div>

    <!-- Row 2 — neutrals + reversed -->
    <div class="cell bg-cream">
      <img src="../brand/isotype-black.png" alt="black on cream"/>
      <div class="lbl">BLACK / CREAM</div>
      <div class="hex">REVERSE</div>
    </div>
    <div class="cell bg-lime-pure">
      <img src="../brand/isotype-black.png" alt="black on lime"/>
      <div class="lbl">BLACK / LIME</div>
      <div class="hex">CONTRASTE</div>
    </div>
    <div class="cell bg-magenta">
      <img src="../brand/isotype-cream.png" alt="cream on magenta"/>
      <div class="lbl">CREAM / MAGENTA</div>
      <div class="hex">N.°FFF8F0</div>
    </div>
    <div class="cell bg-cobalt">
      <img src="../brand/isotype-lime-pure.png" alt="lime on cobalt"/>
      <div class="lbl">LIME / COBALT</div>
      <div class="hex">VIBRA</div>
    </div>
  </div>
</div></body></html>
