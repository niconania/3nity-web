<!doctype html>
<!-- @dsCard group="Brand" name="Brand · Wordmark" subtitle="That That New Pixel + isotype oficial · lockup horizontal" viewport="700x240" --><html><head><meta charset="utf-8"/><title>Brand · Wordmark</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:#A7EA21;color:#1E1F1E;font-family:"JetBrains Mono",monospace}
  .card{
    width:700px;height:240px;
    padding:20px 24px;box-sizing:border-box;
    display:grid;grid-template-columns:1fr auto;grid-template-rows:auto 1fr auto;
    column-gap:24px;row-gap:10px;
    position:relative;
  }
  .meta{font-size:10px;letter-spacing:.22em;text-transform:uppercase;grid-column:1 / span 2}
  .meta .acc{color:#1E1F1E;font-weight:700}

  /* WORDMARK — That That New Pixel, licensed. The "3" replaces the "e". */
  .word{
    font-family:"That That New Pixel",monospace;
    font-size:140px;line-height:.9;letter-spacing:.01em;
    color:#1E1F1E;
    grid-column:1;grid-row:2;
    align-self:center;
  }

  /* ISOTYPE — official mark, locked to wordmark cap-height */
  .iso{
    grid-column:2;grid-row:2;
    align-self:center;justify-self:end;
    width:130px;height:130px;
    display:flex;align-items:center;justify-content:center;
  }
  .iso img{width:100%;height:100%;object-fit:contain;image-rendering:pixelated}

  .specs{
    grid-column:1 / span 2;grid-row:3;
    display:flex;justify-content:space-between;align-items:flex-end;
    font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:#1E1F1E;
  }
  .specs .v{font-weight:500;opacity:.8}
</style></head><body>
<div class="card">
  <div class="meta">WORDMARK · <span class="acc">THAT THAT NEW PIXEL</span> · ISOTYPE LOCKUP</div>

  <div class="word">3nity</div>
  <div class="iso"><img src="../brand/isotype-black.png" alt="3nity isotype"/></div>

  <div class="specs">
    <span>LOCKUP · ISOTYPE A LA DERECHA · ALTURA = WORDMARK</span>
    <span class="v">CLEARSPACE = 1× ALTURA</span>
  </div>
</div></body></html>
