<!doctype html>
<!-- @dsCard group="Colors" name="Colors · Neutrals" subtitle="Black #1E1F1E + Cream #FFF8F0 · estructurales" viewport="700x300" --><html><head><meta charset="utf-8"/><title>Colors · Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:#1E1F1E;color:#FFF8F0;font-family:'JetBrains Mono',monospace}
  .card{
    width:700px;height:300px;
    background:#1E1F1E;
    padding:18px;box-sizing:border-box;
    display:grid;grid-template-columns:1fr 1fr;gap:14px;
  }
  .sw{padding:14px 16px;display:flex;flex-direction:column;justify-content:space-between;box-sizing:border-box;position:relative}
  .name{font-size:9px;letter-spacing:.2em;text-transform:uppercase;font-weight:500;line-height:1}
  .role{font-size:8.5px;letter-spacing:.22em;text-transform:uppercase;opacity:.65;margin-top:4px}
  .specs{display:grid;grid-template-columns:auto 1fr;gap:2px 10px;font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;line-height:1.4}
  .k{opacity:.7}
  .v{font-weight:500}

  .black{background:#1E1F1E;color:#FFF8F0;border:1px solid #FFF8F0}
  .cream{background:#FFF8F0;color:#1E1F1E}
</style></head><body>
<div class="card">
  <div class="sw black">
    <div>
      <div class="name">NEUTRAL · ESTRUCTURA</div>
      <div class="role">FONDO DOMINANTE · GRAFISMOS PIXEL</div>
    </div>
    <div class="specs">
      <div class="k">HEX</div><div class="v">N.°1E1F1E</div>
      <div class="k">RGB</div><div class="v">30, 31, 30</div>
      <div class="k">HSB</div><div class="v">120, 3%, 12%</div>
      <div class="k">CMYK</div><div class="v">75, 64, 61, 80</div>
    </div>
  </div>

  <div class="sw cream">
    <div>
      <div class="name">NEUTRAL · CÁLIDO</div>
      <div class="role">FONDOS LIMPIOS · ACABADO EDITORIAL</div>
    </div>
    <div class="specs">
      <div class="k">HEX</div><div class="v">N.°FFF8F0</div>
      <div class="k">RGB</div><div class="v">255, 248, 240</div>
      <div class="k">HSB</div><div class="v">32, 6%, 100%</div>
      <div class="k">CMYK</div><div class="v">0, 3, 7, 0</div>
    </div>
  </div>
</div></body></html>
