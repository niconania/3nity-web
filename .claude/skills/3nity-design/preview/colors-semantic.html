<!doctype html>
<!-- @dsCard group="Colors" name="Colors · Semantic Tokens" subtitle="–bg, –fg, –accent, –disrupt, –editorial" viewport="700x280" --><html><head><meta charset="utf-8"/><title>Semantic Tokens</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:#1E1F1E;color:#FFF8F0;font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase}
  .card{width:700px;padding:18px 20px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .row{display:flex;align-items:center;gap:10px;padding:6px 8px;border:1px solid #2A2B2A}
  .chip{width:22px;height:22px;border:1px solid #2A2B2A;flex:0 0 22px}
  .k{color:#FFF8F0;flex:1}
  .v{color:#7E7C76}
</style></head><body>
<div class="card">
  <div class="row"><div class="chip" style="background:#1E1F1E"></div><div class="k">--bg</div><div class="v">#1E1F1E</div></div>
  <div class="row"><div class="chip" style="background:#FFF8F0"></div><div class="k">--fg</div><div class="v">#FFF8F0</div></div>
  <div class="row"><div class="chip" style="background:#141514"></div><div class="k">--bg-2</div><div class="v">#141514</div></div>
  <div class="row"><div class="chip" style="background:#C9C3B9"></div><div class="k">--fg-2</div><div class="v">#C9C3B9</div></div>
  <div class="row"><div class="chip" style="background:#232423"></div><div class="k">--surface</div><div class="v">#232423</div></div>
  <div class="row"><div class="chip" style="background:#7E7C76"></div><div class="k">--fg-mute</div><div class="v">#7E7C76</div></div>
  <div class="row"><div class="chip" style="background:#44FF02"></div><div class="k">--accent</div><div class="v">lime</div></div>
  <div class="row"><div class="chip" style="background:#DC0073"></div><div class="k">--disrupt</div><div class="v">magenta</div></div>
  <div class="row"><div class="chip" style="background:#1B2CC1"></div><div class="k">--editorial</div><div class="v">cobalt</div></div>
  <div class="row"><div class="chip" style="background:#2A2B2A"></div><div class="k">--hairline</div><div class="v">1px line</div></div>
</div></body></html>
