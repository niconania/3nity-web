<!doctype html>
<!-- @dsCard group="Components" name="Components · Cards" subtitle="Cream block-shadow + dark lime-glow (revert)" viewport="700x240" --><html><head><meta charset="utf-8"/><title>Cards</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:#FFF8F0;color:#1E1F1E;font-family:"JetBrains Mono",monospace}
  .card{width:700px;height:240px;padding:18px 22px;box-sizing:border-box}
  .meta{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#8A867E;margin-bottom:14px}
  .row{display:flex;gap:14px}
  .c{flex:1;padding:14px;background:#FFF8F0;box-shadow:0 0 0 1px rgba(30,31,30,.9), 6px 6px 0 0 #1E1F1E;display:flex;flex-direction:column;justify-content:space-between;height:160px;box-sizing:border-box}
  .c2{flex:1;padding:14px;background:#1E1F1E;color:#FFF8F0;display:flex;flex-direction:column;justify-content:space-between;height:160px;box-sizing:border-box;box-shadow:0 0 0 2px rgba(68,255,2,.4), 0 0 24px rgba(68,255,2,.45)}
  .tag{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#8A867E}
  .c2 .tag{color:#A7EA21}
  .ttl{font-family:"Clesmont","Space Grotesk",sans-serif;font-weight:700;font-size:22px;text-transform:uppercase;letter-spacing:-.01em;line-height:1}
  .num{font-family:"That That New Pixel","VT323",monospace;font-size:42px;line-height:1}
  .c2 .num{color:#44FF02}
</style></head><body>
<div class="card">
  <div class="meta">Cards · cream uses block-shadow · dark uses lime glow</div>
  <div class="row">
    <div class="c"><div class="tag">PROJECT / 03</div><div class="ttl">HERO SHOT EDITORIAL</div><div class="num">09°</div></div>
    <div class="c2"><div class="tag">SYSTEM / 09°</div><div class="ttl">VISUAL EXPERIMENT</div><div class="num">3nity</div></div>
  </div>
</div></body></html>
