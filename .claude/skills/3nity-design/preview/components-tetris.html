<!doctype html>
<!-- @dsCard group="Components" name="Components · Tetris Layout" subtitle="Pixel-modular grid composition" viewport="700x280" --><html><head><meta charset="utf-8"/><title>Tetris Layout</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:#1E1F1E;color:#FFF8F0;font-family:"JetBrains Mono",monospace}
  .card{width:700px;height:280px;padding:14px;box-sizing:border-box;display:flex;gap:14px}
  .left{flex:1;display:grid;grid-template-columns:repeat(8, 1fr);grid-template-rows:repeat(6, 1fr);gap:0;background:#44FF02;border:1px solid #2A2B2A;position:relative;overflow:hidden}
  .blk{background:#1E1F1E}
  .meta{position:absolute;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#1E1F1E;font-weight:500}
  .right{flex:0 0 200px;display:flex;flex-direction:column;justify-content:space-between}
  .ttl{font-family:"Space Grotesk";font-weight:700;text-transform:uppercase;font-size:18px;letter-spacing:-.01em;line-height:1}
  .lbl{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#7E7C76}
</style></head><body>
<div class="card">
  <div class="left">
    <div class="blk" style="grid-column:5 / 8;grid-row:1 / 3"></div>
    <div class="blk" style="grid-column:7 / 9;grid-row:3 / 5"></div>
    <div class="blk" style="grid-column:5 / 6;grid-row:4 / 6"></div>
    <div class="blk" style="grid-column:1 / 3;grid-row:5 / 7"></div>
    <div class="blk" style="grid-column:3 / 4;grid-row:6 / 7"></div>
    <div class="meta" style="top:10px;left:12px">NUMBERS</div>
    <div class="meta" style="bottom:10px;right:12px">PRINT LIKE US IN 3 STEPS</div>
  </div>
  <div class="right">
    <div class="lbl">Tetris layout · 8×6 grid</div>
    <div>
      <div class="ttl">Pixel<br/>Modular<br/>Composition</div>
      <div class="lbl" style="margin-top:8px">snap-to 32px cell</div>
    </div>
    <div class="lbl">→ invade from corners</div>
  </div>
</div></body></html>
