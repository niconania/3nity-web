<!doctype html>
<!-- @dsCard group="Spacing" name="Spacing · Radii" subtitle="Sharp by default · pills only for circular glyphs" viewport="700x170" --><html><head><meta charset="utf-8"/><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:#1E1F1E;color:#FFF8F0;font-family:"JetBrains Mono",monospace}
  .card{width:700px;height:170px;padding:18px 22px;box-sizing:border-box}
  .meta{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#7E7C76;margin-bottom:14px}
  .row{display:flex;gap:18px;align-items:flex-start}
  .item{display:flex;flex-direction:column;gap:6px;align-items:center}
  .sq{width:88px;height:88px;background:#44FF02}
  .lbl{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:#C9C3B9}
  .v{font-size:10px;color:#7E7C76}
</style></head><body>
<div class="card">
  <div class="meta">Radii · sharp by default. Pills only for circular punctuation glyphs.</div>
  <div class="row">
    <div class="item"><div class="sq" style="border-radius:0"></div><div class="lbl">--r-0</div><div class="v">0px</div></div>
    <div class="item"><div class="sq" style="border-radius:2px"></div><div class="lbl">--r-pix</div><div class="v">2px</div></div>
    <div class="item"><div class="sq" style="border-radius:4px"></div><div class="lbl">--r-sm</div><div class="v">4px</div></div>
    <div class="item"><div class="sq" style="border-radius:8px"></div><div class="lbl">--r-md</div><div class="v">8px</div></div>
    <div class="item"><div class="sq" style="border-radius:999px"></div><div class="lbl">--r-pill</div><div class="v">circular glyph</div></div>
  </div>
</div></body></html>
