<!doctype html>
<!-- @dsCard group="Spacing" name="Spacing · Tokens" subtitle="4px modular grid · Tetris snap" viewport="700x280" --><html><head><meta charset="utf-8"/><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:#1E1F1E;color:#FFF8F0;font-family:"JetBrains Mono",monospace}
  .card{width:700px;padding:18px 22px;box-sizing:border-box}
  .meta{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#7E7C76;margin-bottom:12px}
  .row{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .lbl{flex:0 0 90px;font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:#C9C3B9}
  .bar{height:14px;background:#44FF02}
  .px{font-size:11px;color:#7E7C76;letter-spacing:.1em}
</style></head><body>
<div class="card">
  <div class="meta">Spacing · 4px modular grid · Tetris snap</div>
  <div class="row"><div class="lbl">--s-1</div><div class="bar" style="width:4px"></div><div class="px">4px</div></div>
  <div class="row"><div class="lbl">--s-2</div><div class="bar" style="width:8px"></div><div class="px">8px</div></div>
  <div class="row"><div class="lbl">--s-3</div><div class="bar" style="width:12px"></div><div class="px">12px</div></div>
  <div class="row"><div class="lbl">--s-4</div><div class="bar" style="width:16px"></div><div class="px">16px</div></div>
  <div class="row"><div class="lbl">--s-5</div><div class="bar" style="width:24px"></div><div class="px">24px</div></div>
  <div class="row"><div class="lbl">--s-6</div><div class="bar" style="width:32px"></div><div class="px">32px · grid-cell</div></div>
  <div class="row"><div class="lbl">--s-7</div><div class="bar" style="width:48px"></div><div class="px">48px</div></div>
  <div class="row"><div class="lbl">--s-8</div><div class="bar" style="width:64px"></div><div class="px">64px</div></div>
  <div class="row"><div class="lbl">--s-9</div><div class="bar" style="width:96px"></div><div class="px">96px</div></div>
</div></body></html>
