<!doctype html>
<!-- @dsCard group="Type" name="Type · Scale" subtitle="Display → body specimen ladder" viewport="700x280" --><html><head><meta charset="utf-8"/><title>Type · Scale</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:#FFF8F0;color:#1E1F1E;font-family:"JetBrains Mono",monospace}
  .card{width:700px;padding:18px 22px;box-sizing:border-box}
  .row{display:flex;align-items:baseline;gap:14px;border-top:1px solid #E2DBD0;padding:8px 0}
  .row:first-child{border-top:0}
  .lbl{flex:0 0 110px;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#8A867E}
  .px{flex:0 0 60px;font-size:11px;color:#8A867E}
  .sample{flex:1;font-family:"Clesmont","Space Grotesk",sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:-0.01em;line-height:1;white-space:nowrap;overflow:hidden}
</style></head><body>
<div class="card">
  <div class="row"><div class="lbl">Display-xl</div><div class="px">88px</div><div class="sample" style="font-size:64px">3NITY</div></div>
  <div class="row"><div class="lbl">Display-lg</div><div class="px">64px</div><div class="sample" style="font-size:44px">3NITY</div></div>
  <div class="row"><div class="lbl">H1</div><div class="px">48px</div><div class="sample" style="font-size:32px">3NITY</div></div>
  <div class="row"><div class="lbl">H2</div><div class="px">32px</div><div class="sample" style="font-size:24px">3NITY</div></div>
  <div class="row"><div class="lbl">H3</div><div class="px">22px</div><div class="sample" style="font-size:18px">3NITY</div></div>
  <div class="row"><div class="lbl">Body</div><div class="px">16px</div><div class="sample" style="font-size:14px;font-weight:400;font-family:'JetBrains Mono'">3NITY / 09°</div></div>
</div></body></html>
