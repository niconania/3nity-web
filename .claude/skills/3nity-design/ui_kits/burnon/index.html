<!doctype html>
<!-- @dsCard group="UI Kit — Burnon" name="UI Kit · BurnOn" subtitle="AI-powered fitness app · 4 mobile screens" viewport="1280x900" -->
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>3NITY · BurnOn UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<style>
  html,body{margin:0;background:#0F100F;color:#FFF8F0;font-family:'JetBrains Mono',monospace}
  .stage{padding:36px 28px;min-height:100vh;box-sizing:border-box}
  .head{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:1px solid #2A2B2A;padding-bottom:18px;margin-bottom:32px;max-width:1280px;margin-left:auto;margin-right:auto}
  .h1{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:42px;text-transform:uppercase;letter-spacing:-.01em;line-height:1}
  .meta{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#7E7C76}
  .accent{color:#44FF02}
  .grid{display:flex;gap:32px;justify-content:center;flex-wrap:wrap;max-width:1700px;margin:0 auto}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">window.useState = React.useState;</script>
<script type="text/babel" src="Components.jsx"></script>
<script type="text/babel" src="Screens.jsx"></script>
<script type="text/babel">
const { useState } = React;
function App(){
  const [route, setRoute] = useState('home');
  return (
    <div className="stage">
      <div className="head">
        <div>
          <div className="meta">UI KIT · BURNON</div>
          <div className="h1">BURN<span className="accent">ON</span> / AI POWERED FITNESS</div>
          <div className="meta" style={{marginTop:8}}>SYSTEM 09° · 4 SCREENS · MOBILE / DARK</div>
        </div>
        <div className="meta">CLICK <span className="accent">BEGIN SESSION</span> TO ROUTE THROUGH FLOW</div>
      </div>
      <div className="grid">
        <BO_LoginScreen onLogin={()=>setRoute('home')}/>
        <BO_HomeScreen onWorkout={()=>setRoute('workout')}/>
        <BO_WorkoutScreen onBack={()=>setRoute('home')}/>
        <BO_CoachScreen/>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body></html>
